<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>我的記帳本 Pro</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; background-color: #f2f2f7; margin: 0; padding: 20px; color: #000; padding-bottom: 50px; }
        .container { max-width: 400px; margin: 0 auto; }
        h2 { text-align: center; color: #1c1c1e; margin-bottom: 25px; }
        .card { background: #fff; padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); margin-bottom: 20px; }
        .card-title { font-size: 18px; font-weight: bold; margin-bottom: 15px; color: #1c1c1e; border-bottom: 2px solid #f2f2f7; padding-bottom: 10px; display: flex; justify-content: space-between; align-items: center; }
        input, select, button { width: 100%; padding: 12px; margin: 8px 0; border-radius: 8px; border: 1px solid #d1d1d6; box-sizing: border-box; font-size: 16px; }
        button { background-color: #007aff; color: white; border: none; font-weight: bold; cursor: pointer; }
        button:active { opacity: 0.8; }
        .expense-item { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid #e5e5ea; }
        .expense-item:last-child { border-bottom: none; }
        .delete-btn { color: #ff3b30; cursor: pointer; font-size: 14px; margin-left: 10px; }
        .total-display { font-size: 22px; font-weight: bold; text-align: center; color: #34c759; margin-top: 10px; }
        .month-picker { width: auto; padding: 5px; margin: 0; font-size: 14px; border: none; background: #f2f2f7; border-radius: 4px; }
        #chartContainer { width: 100%; margin-bottom: 15px; }
        .sync-btn { background-color: #5856d6; margin-top: 10px; }
        .export-btn { background-color: #34c759; }
    </style>
</head>
<body>

<div class="container">
    <h2>Expense Tracker</h2>
    
    <div class="card">
        <div class="card-title">新增開支</div>
        <input type="date" id="expenseDate">
        <input type="number" id="amount" placeholder="輸入金額" step="0.01">
        
        <select id="category" onchange="toggleCustomInput()">
            <option value="Food">Food</option>
            <option value="Transport">Transport</option>
            <option value="Shopping">Shopping</option>
            <option value="Bills">Bills</option>
            <option value="Other">Other (自行輸入)</option>
        </select>
        
        <input type="text" id="customCategory" placeholder="請輸入類別名稱" style="display: none;">
        
        <button onclick="addExpense()">儲存記錄</button>
    </div>

    <div class="card">
        <div class="card-title">
            每月總覽
            <input type="month" id="viewMonth" class="month-picker" onchange="updateUI()">
        </div>
        
        <div id="chartContainer">
            <canvas id="expenseChart"></canvas>
        </div>

        <div id="monthlyBreakdown"></div>
        
        <div class="total-display">
            該月總額: $<span id="monthTotal">0.00</span>
        </div>
    </div>

    <div class="card">
        <div class="card-title">歷史記錄回顧</div>
        <div id="expenseList"></div>
    </div>

    <div class="card">
        <div class="card-title">跨裝置同步</div>
        <p style="font-size: 12px; color: #666;">將代碼複製並傳送到另一台裝置貼上即可同步。</p>
        <button class="export-btn" onclick="exportData()">導出數據 (複製)</button>
        <button class="sync-btn" onclick="importData()">導入數據 (貼上)</button>
        <button onclick="clearAll()" style="background-color: #ff3b30; margin-top: 20px; font-size: 12px;">清空本機所有數據</button>
    </div>
</div>

<script>
    // 初始化數據庫
    let expenses = JSON.parse(localStorage.getItem('myExpenses')) || [];
    let myChart = null;

    // 設定預設日期
    const today = new Date();
    document.getElementById('expenseDate').valueAsDate = today;
    document.getElementById('viewMonth').value = today.getFullYear() + '-' + String(today.getMonth() + 1).padStart(2, '0');

    function toggleCustomInput() {
        const cat = document.getElementById('category').value;
        document.getElementById('customCategory').style.display = (cat === 'Other') ? 'block' : 'none';
    }

    // 更新介面核心邏輯
    function updateUI() {
        const list = document.getElementById('expenseList');
        const breakdown = document.getElementById('monthlyBreakdown');
        const monthTotalSpan = document.getElementById('monthTotal');
        const selectedMonth = document.getElementById('viewMonth').value;
        
        list.innerHTML = '';
        breakdown.innerHTML = '';
        let monthTotal = 0;
        let categoryTotals = {};

        // 排序：由新到舊
        const sorted = [...expenses].sort((a, b) => new Date(b.date) - new Date(a.date));

        sorted.forEach((exp, index) => {
            const originalIndex = expenses.indexOf(exp);
            
            // 顯示歷史記錄
            list.innerHTML += `
                <div class="expense-item">
                    <div><b>${exp.category}</b><br><small style="color:#8e8e93;">${exp.date}</small></div>
                    <div>
                        <span style="font-weight:bold;">$${parseFloat(exp.amount).toFixed(2)}</span>
                        <span class="delete-btn" onclick="deleteExpense(${originalIndex})">刪除</span>
                    </div>
                </div>
            `;

            // 計算選定月份
            if (exp.date.startsWith(selectedMonth)) {
                monthTotal += parseFloat(exp.amount);
                categoryTotals[exp.category] = (categoryTotals[exp.category] || 0) + parseFloat(exp.amount);
            }
        });

        // 顯示分類清單
        for (const [cat, sum] of Object.entries(categoryTotals)) {
            breakdown.innerHTML += `
                <div style="display:flex; justify-content:space-between; font-size:14px; padding:5px 0;">
                    <span>${cat}</span><b>$${sum.toFixed(2)}</b>
                </div>
            `;
        }

        monthTotalSpan.innerText = monthTotal.toFixed(2);
        drawChart(categoryTotals);
    }

    // 畫圖
    function drawChart(categoryData) {
        const ctx = document.getElementById('expenseChart').getContext('2d');
        if (myChart) myChart.destroy();

        const labels = Object.keys(categoryData);
        if (labels.length === 0) {
            ctx.clearRect(0, 0, 400, 400);
            return;
        }

        myChart = new Chart(ctx, {
            type: 'pie',
            data: {
                labels: labels,
                datasets: [{
                    data: Object.values(categoryData),
                    backgroundColor: ['#ff3b30', '#ff9500', '#ffcc00', '#34c759', '#007aff', '#5856d6', '#af52de'],
                    borderWidth: 1
                }]
            },
            options: { responsive: true, plugins: { legend: { position: 'bottom' } } }
        });
    }

    // 新增
    function addExpense() {
        const date = document.getElementById('expenseDate').value;
        const amt = document.getElementById('amount').value;
        let cat = document.getElementById('category').value;
        
        if (cat === 'Other') {
            cat = document.getElementById('customCategory').value.trim() || 'Other';
        }

        if (!amt || !date) return alert('請填寫完整資訊');

        expenses.push({ date, amount: amt, category: cat });
        saveAndRefresh();
        
        document.getElementById('amount').value = '';
        document.getElementById('customCategory').value = '';
    }

    // 刪除
    function deleteExpense(idx) {
        if(confirm("確定刪除？")) {
            expenses.splice(idx, 1);
            saveAndRefresh();
        }
    }

    function saveAndRefresh() {
        localStorage.setItem('myExpenses', JSON.stringify(expenses));
        updateUI();
    }

    // --- 同步功能 ---
    function exportData() {
        const dataStr = JSON.stringify(expenses);
        const el = document.createElement('textarea');
        el.value = dataStr;
        document.body.appendChild(el);
        el.select();
        document.execCommand('copy');
        document.body.removeChild(el);
        alert("所有數據已複製！請發送到電腦或手機貼上。");
    }

    function importData() {
        const input = prompt("請貼上數據代碼：");
        if (input) {
            try {
                const newData = JSON.parse(input);
                if (Array.isArray(newData)) {
                    expenses = newData;
                    saveAndRefresh();
                    alert("同步完成！");
                }
            } catch(e) { alert("代碼無效"); }
        }
    }

    function clearAll() {
        if(confirm("將清空所有記錄，確定嗎？")) {
            expenses = [];
            saveAndRefresh();
        }
    }

    // 啟動
    updateUI();
</script>

</body>
</html>
