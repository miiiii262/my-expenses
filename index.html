<div class="card">
    <div class="card-title">數據備份 (手動同步)</div>
    <button onclick="exportData()" style="background-color: #34c759;">導出代碼 (手機 -> 電腦)</button>
    <button onclick="importData()" style="background-color: #5856d6; margin-top: 10px;">導入代碼 (貼上數據)</button>
</div>

<script>
    // 導出功能
    function exportData() {
        const dataStr = JSON.stringify(expenses);
        const blob = new Blob([dataStr], {type: "application/json"});
        const url = URL.createObjectURL(blob);
        
        // 彈出對話框顯示代碼，方便複製
        const tempInput = document.createElement("textarea");
        tempInput.value = dataStr;
        document.body.appendChild(tempInput);
        tempInput.select();
        document.execCommand("copy");
        document.body.removeChild(tempInput);
        
        alert("數據代碼已複製到剪貼簿！你可以發送到電腦貼上。");
    }

    // 導入功能
    function importData() {
        const input = prompt("請貼上從另一台裝置複製的數據代碼：");
        if (input) {
            try {
                const importedData = JSON.parse(input);
                if (Array.isArray(importedData)) {
                    expenses = importedData;
                    localStorage.setItem('myExpenses', JSON.stringify(expenses));
                    updateUI();
                    alert("同步成功！");
                }
            } catch (e) {
                alert("代碼格式錯誤，請重新複製。");
            }
        }
    }
</script>
